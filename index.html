<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Efetivo">
<meta name="theme-color" content="#111111">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111;--surface:#1e1e1e;--surface2:#2a2a2a;--surface3:#333;
  --accent:#fff;--text:#fff;--muted:#888;--border:#333;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;
  --nav-h:64px;--hdr-h:52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;overflow:hidden}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--bg);display:flex;align-items:center;padding:0 18px;z-index:200;border-bottom:1px solid var(--border)}
#hdr h1{font-size:20px;font-weight:700;flex:1}
#hdr input[type=date]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:8px;font-size:13px}
#hdr input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5}

/* PAGES */
.page{position:fixed;top:var(--hdr-h);left:0;right:0;bottom:var(--nav-h);overflow-y:auto;padding:16px;display:none}
.page.active{display:block}

/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.nav-btn{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;transition:.15s}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}

/* SECTION TITLES */
.sec-title{font-size:20px;font-weight:700;margin:4px 0 14px}
.sub-title{font-size:17px;font-weight:700;margin:18px 0 10px}

/* GROUP BLOCK */
.group-block{margin-bottom:22px}
.group-name{font-size:17px;font-weight:700;margin-bottom:8px}
.emp-row{display:flex;align-items:center;background:var(--surface2);border-radius:0;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s;user-select:none}
.emp-row:first-of-type{border-radius:8px 8px 0 0}
.emp-row:last-of-type{border-radius:0 0 8px 8px;border-bottom:none}
.emp-row:only-of-type{border-radius:8px}
.emp-row.present{background:#1a2a1a}
.emp-row.present .emp-name{color:#4ade80}
.emp-row .emp-name{flex:1;font-size:14px}
.emp-row .emp-func{font-size:12px;color:var(--muted);margin-right:10px}
.emp-row .emp-rm{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;font-size:18px;line-height:1;flex-shrink:0}
.emp-row .emp-rm:hover{color:var(--red)}

/* ADD BTN */
.add-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;transition:.15s}
.add-btn:hover{border-color:#fff}
.add-btn-primary{background:var(--surface2);border:none}

/* INLINE FORM */
.inline-form{background:var(--surface2);border-radius:10px;padding:14px;margin-top:8px}
.inline-form h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:#555}
.fg textarea{min-height:70px}
.form-row{display:flex;gap:8px}
.form-row .fg{flex:1}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-white{background:#fff;color:#000}
.btn-white:active{background:#ddd}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{color:var(--red);border-color:var(--red)}

/* STATS TAB */
.func-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.func-row .fname{width:140px;font-size:14px;font-weight:600;flex-shrink:0}
.func-row .badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700;flex-shrink:0}
.badge-mod{background:#1e3a5f;color:#60a5fa}
.badge-moi{background:#3b2a1a;color:#fb923c}
.bar-outer{flex:1;height:10px;background:var(--surface3);border-radius:5px;overflow:hidden}
.bar-inner{height:100%;border-radius:5px;transition:.4s}
.bar-green{background:var(--green)}
.bar-yellow{background:var(--yellow)}
.bar-red{background:var(--red)}
.func-row .flabel{font-size:12px;color:var(--muted);min-width:70px;text-align:right;flex-shrink:0}

.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}
.stat-card{background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
.stat-card .sv{font-size:28px;font-weight:700}
.stat-card .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.preview-box{background:var(--surface2);border-radius:10px;padding:14px;font-size:13px;line-height:1.85;color:#ccc;font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-word;min-height:80px;margin-bottom:10px}

/* ATIVIDADES TAB */
.atv-bloco{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:12px;position:relative}
.atv-bloco .rm-bloco{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px}
.atv-bloco .rm-bloco:hover{color:var(--red)}

/* EMPLOYEE CHIPS */
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--surface3);border:1px solid var(--border);padding:5px 10px;border-radius:16px;font-size:12px;display:flex;align-items:center;gap:6px}
.chip .crm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0}
.chip .crm:hover{color:var(--red)}

/* AUTOCOMPLETE */
.ac-wrap{position:relative}
.ac-list{position:absolute;z-index:100;background:var(--surface2);border:1px solid var(--border);border-radius:8px;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;margin-top:2px;display:none;box-shadow:0 8px 24px #00000088}
.ac-list.open{display:block}
.ac-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between}
.ac-item:hover,.ac-item:active{background:var(--surface3)}
.ac-item .acf{color:var(--muted);font-size:11px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:#000a;z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;margin-top:-4px}

/* MISC */
.divider{height:1px;background:var(--border);margin:20px 0}
.nod{text-align:center;padding:30px;color:var(--muted);font-size:14px}
</style>
</head>

  </div>

  <div id="atv-blocos"></div>

<!-- BOTTOM NAV -->
<div id="nav">

  <button class="nav-btn" data-page="stats" onclick="switchPage('stats',this)">

<div class="modal-bg" id="modal-new-group" onclick="closeModalBg(event,'modal-new-group')">

// ── STORAGE ─────────────────────────────────────────────────────
function s_get(k,def){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):def}catch{return def}}
function s_set(k,v){localStorage.setItem(k,JSON.stringify(v))}

function loadCustomGroups(){return s_get('custom_groups',[])}
function saveCustomGroups(a){s_set('custom_groups',a)}
function loadCustomEmps(){return s_get('custom_emps',[])}
function saveCustomEmps(a){s_set('custom_emps',a)}
function loadDeletedIds(){return s_get('deleted_ids',[])}
function saveDeletedIds(a){s_set('deleted_ids',a)}

function getGroups(){
  const deleted = new Set(loadDeletedIds());
  const customEmps = loadCustomEmps();
  const customGroups = loadCustomGroups();
  const all = [...BASE_GROUPS, ...customGroups];
  return all.map(g=>({
    ...g,
    emps: g.emps.filter(e=>!deleted.has(e.id))
      .concat(customEmps.filter(e=>e.gid===g.id))
  }));
}
function getAllEmps(){return getGroups().flatMap(g=>g.emps)}

// ── ATTENDANCE ───────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10)}
function getAtt(d){return s_get('att_'+d,{})}
function saveAtt(d,o){s_set('att_'+d,o)}
function prIds(d){const a=getAtt(d);return new Set(Object.keys(a).filter(k=>a[k]))}
function formatPT(d){if(!d)return'';const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y}

const dp=document.getElementById('dp');
dp.value=todayStr();
dp.addEventListener('change',()=>{
  atvBlocos = loadAtvBlocos(dp.value);
  renderAll();
});
function D(){return dp.value||todayStr()}

// ── NAVIGATION ──────────────────────────────────────────────────
const PAGE_TITLES = {controle:'Controle de Efetivo',stats:'Estatísticas',atv:'Atividades'};
function switchPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[id];
  renderAll();
}

// ── MODALS ──────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function closeModalBg(e,id){if(e.target===document.getElementById(id))closeModal(id)}

// ── TAB 1: CONTROLE ─────────────────────────────────────────────
function renderControle(){
  const d=D(), pr=prIds(d), groups=getGroups();
  const container = document.getElementById('groups-container');
  let html = '';

  groups.forEach(g=>{
    html += `<div class="group-block">
      <div class="group-name">${g.label}</div>`;
    if(g.emps.length){
      html += '<div>';
      g.emps.forEach(e=>{
        const on = pr.has(e.id);
        html += `<div class="emp-row${on?' present':''}" onclick="toggleEmp('${e.id}')">
          <span class="emp-name">${e.n}</span>
          <span class="emp-func">${e.f}</span>
          <button class="emp-rm" onclick="event.stopPropagation();removeEmpConfirm('${e.id}','${g.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </button>
        </div>`;
      });
      html += '</div>';
    } else {
      html += '<div style="font-size:13px;color:var(--muted);padding:8px 0">Nenhum colaborador ativo.</div>';
    }
    html += `<button class="add-btn" onclick="openAddEmp('${g.id}')">+ adicionar</button>
    </div>`;
  });

  container.innerHTML = html;
}

window.toggleEmp = function(id){
  const a = getAtt(D());
  a[id] = !a[id];
  saveAtt(D(), a);
  renderControle();
  // refresh stats if visible
  if(document.getElementById('page-stats').classList.contains('active')) renderStats();
};

window.removeEmpConfirm = function(id, gid){
  if(!confirm('Remover este colaborador da lista?')) return;
  const customEmps = loadCustomEmps();
  if(customEmps.find(e=>e.id===id)){
    saveCustomEmps(customEmps.filter(e=>e.id!==id));
  } else {
    const del = loadDeletedIds();
    if(!del.includes(id)) del.push(id);
    saveDeletedIds(del);
  }
  renderControle();
};

window.openAddEmp = function(gid){
  document.getElementById('ae-gid').value = gid;
  document.getElementById('ae-name').value = '';
  const sel = document.getElementById('ae-func');
  sel.innerHTML = FUNC_ORDER.map(f=>`<option value="${f}">${f}</option>`).join('');
  openModal('modal-add-emp');
};

window.confirmAddEmp = function(){
  const name = document.getElementById('ae-name').value.trim();
  const func = document.getElementById('ae-func').value;
  const gid = document.getElementById('ae-gid').value;
  if(!name){alert('Informe o nome.');return}
  const emps = loadCustomEmps();
  emps.push({id:'ce_'+Date.now(), n:name, f:func, gid});
  saveCustomEmps(emps);
  closeModal('modal-add-emp');
  renderControle();
};

window.addNewGroup = function(){
  const name = document.getElementById('ng-name').value.trim();
  if(!name){alert('Informe o nome.');return}
  const id = 'cg_'+Date.now();
  const label = name;
  const rL = 'COLABORADORES EMPREITEIRO - '+name.toUpperCase();
  const groups = loadCustomGroups();
  groups.push({id, label, rL, emps:[]});
  saveCustomGroups(groups);
  document.getElementById('ng-name').value='';
  closeModal('modal-new-group');
  renderControle();
};

// ── TAB 2: ESTATÍSTICAS ─────────────────────────────────────────
function renderStats(){
  const d=D(), pr=prIds(d), groups=getGroups();
  const allEmps = groups.flatMap(g=>g.emps);
  const presentEmps = allEmps.filter(e=>pr.has(e.id));

  // Count total registered per function
  const totalByFunc = {};
  allEmps.forEach(e=>{
    const f=e.f.toLowerCase().trim();
    totalByFunc[f]=(totalByFunc[f]||0)+1;
  });
  // Count present per function
  const presentByFunc = {};
  presentEmps.forEach(e=>{
    const f=e.f.toLowerCase().trim();
    presentByFunc[f]=(presentByFunc[f]||0)+1;
  });

  // FUNC BARS
  const funcKeys = FUNC_ORDER.filter(f=>totalByFunc[f]>0);
  let barsHtml = '';
  funcKeys.forEach(f=>{
    const total=totalByFunc[f]||0;
    const present=presentByFunc[f]||0;
    const pct=total>0?Math.round(present/total*100):0;
    const isMOD=MOD_F.includes(f), isMOI=MOI_F.includes(f);
    const barColor = pct>=80?'bar-green':pct>=50?'bar-yellow':'bar-red';
    barsHtml += `<div class="func-row">
      <span class="fname">${f.charAt(0).toUpperCase()+f.slice(1)}</span>
      ${isMOD?'<span class="badge badge-mod">MOD</span>':isMOI?'<span class="badge badge-moi">MOI</span>':''}
      <div class="bar-outer"><div class="bar-inner ${barColor}" style="width:${pct}%"></div></div>
      <span class="flabel">${present} | ${pct}%</span>
    </div>`;
  });
  document.getElementById('func-bars').innerHTML = barsHtml||'<div class="nod">Nenhum colaborador marcado.</div>';

  // STAT CARDS
  const totMOI = presentEmps.filter(e=>MOI_F.includes(e.f.toLowerCase().trim())).length;
  const totMOD = presentEmps.filter(e=>MOD_F.includes(e.f.toLowerCase().trim())).length;
  const totAll = presentEmps.length;
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="sv">${totMOI}</div><div class="sl">MOI - INDIRETO</div></div>
    <div class="stat-card"><div class="sv">${totMOD}</div><div class="sl">MOD - DIRETO</div></div>
    <div class="stat-card"><div class="sv">${totAll}</div><div class="sl">EFETIVO TOTAL</div></div>`;

  // REPORT RÁPIDO
  const moiEmps = presentEmps.filter(e=>MOI_F.includes(e.f.toLowerCase().trim()));
  const modEmps = presentEmps.filter(e=>MOD_F.includes(e.f.toLowerCase().trim()));
  function buildFuncBlock(emps){
    const fc={};
    emps.forEach(e=>{const f=e.f.toLowerCase().trim();fc[f]=(fc[f]||0)+1});
    return Object.entries(fc).sort((a,b)=>funcIdx(a[0])-funcIdx(b[0]))
      .map(([f,n])=>{
        const label = f==='tst'?'TST':plur(f,n);
        return String(n).padStart(2,'0')+' - '+label;
      }).join('\n');
  }
  let rapido = '';
  if(moiEmps.length){
    rapido += buildFuncBlock(moiEmps);
    rapido += '\n*TOTAL ADM: '+String(moiEmps.length).padStart(2,'0')+'*';
  }
  if(modEmps.length){
    if(rapido) rapido += '\n\n';
    rapido += buildFuncBlock(modEmps);
    rapido += '\n*TOTAL PRODUÇÃO: '+String(modEmps.length).padStart(2,'0')+'*';
  }
  if(totAll) rapido += '\n\n*EFETIVO TOTAL: '+String(totAll).padStart(2,'0')+'*';
  document.getElementById('report-rapido').textContent = rapido||'Nenhum colaborador marcado.';

  // REPORT DETALHADO (manhã)
  let det = '';
  groups.forEach(g=>{
    const pe=g.emps.filter(e=>pr.has(e.id));
    if(!pe.length) return;
    const fc={};
    pe.forEach(e=>{const f=e.f.toLowerCase().trim();fc[f]=(fc[f]||0)+1});
    det += '*'+g.rL+':*\n';
    Object.entries(fc).sort((a,b)=>funcIdx(a[0])-funcIdx(b[0]))
      .forEach(([f,n])=>{det+=String(n).padStart(2,'0')+' - '+plur(f,n)+'\n'});
    det += '\n';
  });
  document.getElementById('report-detalhado').textContent = det.trim()||'Nenhum colaborador marcado.';
}

// ── TAB 3: ATIVIDADES ───────────────────────────────────────────
// ── ATIVIDADES STATE (persistido por data) ──────────────────────
let atvBid = 2;

function atvKey(d){ return 'atv_blocos_' + (d || D()) }

function loadAtvBlocos(d){
  const saved = s_get(atvKey(d), null);
  if(saved && saved.length){
    // Sync atvBid to avoid ID collision
    const maxId = Math.max(...saved.map(b=>b.id));
    if(maxId >= atvBid) atvBid = maxId + 1;
    return saved;
  }
  return [{id:1, local:'', gid:'', atv:'', emps:[]}];
}

function saveAtvBlocos(d){
  s_set(atvKey(d || D()), atvBlocos);
}

let atvBlocos = loadAtvBlocos(null);

function parseLocal(local){
  const s=(local||'').toUpperCase();
  const qd=parseInt((s.match(/QD\.\s*(\d+)/)||[,0])[1]);
  const lt=parseInt((s.match(/LT\.\s*(\d+)/)||[,0])[1]);
  return [isNaN(qd)?999:qd, isNaN(lt)?999:lt];
}

function buildAtvMsg(){
  const groups = getGroups();
  const byGroup = {};
  atvBlocos.forEach(b=>{
    if(!b.gid||!b.local.trim()) return;
    if(!byGroup[b.gid]) byGroup[b.gid]=[];
    byGroup[b.gid].push(b);
  });
  if(!Object.keys(byGroup).length) return 'Preencha os dados acima para gerar o report.';
  const parts = [];
  Object.entries(byGroup).forEach(([gid,blocos])=>{
    const grp = groups.find(g=>g.id===gid);
    if(!grp) return;
    const sorted = [...blocos].sort((a,b)=>{
      const[qa,la]=parseLocal(a.local),[qb,lb]=parseLocal(b.local);
      return qa!==qb?qa-qb:la-lb;
    });
    // Título do empreiteiro com linha em branco abaixo
    let sec = '*ATIVIDADES EFETIVO '+grp.rL.replace('COLABORADORES ','')+':*\n\n';
    sorted.forEach((b,i)=>{
      // • unidade (linha em branco antes das atividades)
      sec += '• '+b.local.trim()+'\n\n';
      // ATIVIDADES: com - em cada item
      sec += 'ATIVIDADES:\n';
      const atvLines = (b.atv||'').split('\n').filter(l=>l.trim());
      if(atvLines.length){
        atvLines.forEach(l=>{ sec += '- '+l.trim()+'\n' });
      } else {
        sec += '- [Sem atividades]\n';
      }
      // linha em branco antes de EFETIVO
      sec += '\nEFETIVO:\n';
      if(b.emps.length) b.emps.forEach(e=>{ sec += e.n+' - '+e.f+'\n' });
      else sec += '[Nenhum colaborador]\n';
      // separador entre locais do mesmo empreiteiro
      if(i < sorted.length-1) sec += '__\n\n';
    });
    parts.push(sec.trimEnd());
  });
  // separador entre empreiteiros
  return parts.join('\n\n_______\n\n\n');
}

function renderAtv(){
  const groups = getGroups();
  const groupOptions = groups.map(g=>`<option value="${g.id}">${g.label}</option>`).join('');

  let html = '';
  atvBlocos.forEach(b=>{
    html += `<div class="atv-bloco" id="ab-${b.id}">
      ${atvBlocos.length>1?`<button class="rm-bloco" onclick="rmAtvBloco(${b.id})">×</button>`:''}
      <div class="fg"><label>Local</label>
        <input type="text" placeholder="Ex: QD. 01 LT. 10 |" value="${esc(b.local)}" oninput="atvLocal(${b.id},this.value)">
      </div>
      <div class="fg"><label>Equipe</label>
        <select onchange="atvGid(${b.id},this.value)">
          <option value="">Selecionar equipe...</option>
          ${groupOptions.replace(`value="${b.gid}"`,`value="${b.gid}" selected`)}
        </select>
      </div>
      <div class="fg"><label>Efetivo</label>
        <div class="ac-wrap">
          <input type="text" placeholder="Buscar colaborador..." id="asi-${b.id}"
            oninput="atvAcSearch(${b.id},this.value)"
            onblur="setTimeout(function(){atvAcClose(${b.id})},200)">
          <div class="ac-list" id="aac-${b.id}"></div>
        </div>
        <div class="chip-wrap" id="achips-${b.id}">
          ${b.emps.map(e=>`<span class="chip">${e.n} <span style="color:var(--muted);font-size:10px">– ${e.f}</span><button class="crm" onclick="atvRmEmp(${b.id},'${e.id}')">×</button></span>`).join('')}
        </div>
      </div>
      <div class="fg"><label>Atividades (uma por linha)</label>
        <textarea placeholder="Execução de alvenaria..." oninput="atvAtv(${b.id},this.value)">${esc(b.atv)}</textarea>
      </div>
    </div>`;
  });
  document.getElementById('atv-blocos').innerHTML = html;
  document.getElementById('atv-preview').textContent = buildAtvMsg();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

window.addAtvBloco = ()=>{atvBlocos.push({id:atvBid++,local:'',gid:'',atv:'',emps:[]});saveAtvBlocos();renderAtv()};
window.rmAtvBloco = id=>{atvBlocos=atvBlocos.filter(b=>b.id!==id);saveAtvBlocos();renderAtv()};
window.atvLocal = (id,v)=>{const b=atvBlocos.find(b=>b.id===id);if(b){b.local=v;saveAtvBlocos();updateAtvPv()}};
window.atvGid = (id,v)=>{const b=atvBlocos.find(b=>b.id===id);if(b){b.gid=v;saveAtvBlocos();updateAtvPv()}};
window.atvAtv = (id,v)=>{const b=atvBlocos.find(b=>b.id===id);if(b){b.atv=v;saveAtvBlocos();updateAtvPv()}};
window.atvRmEmp = (bid,eid)=>{const b=atvBlocos.find(b=>b.id===bid);if(b){b.emps=b.emps.filter(e=>e.id!==eid);saveAtvBlocos();renderAtv()}};

window.atvAcSearch = (bid,val)=>{
  const box=document.getElementById('aac-'+bid);if(!box)return;
  if(!val.trim()){box.classList.remove('open');return}
  const q=val.toLowerCase();
  const b=atvBlocos.find(b=>b.id===bid);
  let pool = getAllEmps();
  if(b&&b.gid){
    const grp=getGroups().find(g=>g.id===b.gid);
    if(grp) pool=grp.emps;
  }
  const res=pool.filter(e=>e.n.toLowerCase().includes(q)).slice(0,10);
  if(!res.length){box.classList.remove('open');return}
  box.innerHTML=res.map(e=>`<div class="ac-item" onmousedown="atvAddEmp(${bid},'${e.id}')">
    <span>${e.n}</span><span class="acf">${e.f}</span>
  </div>`).join('');
  box.classList.add('open');
};
window.atvAcClose = bid=>{const b=document.getElementById('aac-'+bid);if(b)b.classList.remove('open')};
window.atvAddEmp = (bid,eid)=>{
  const b=atvBlocos.find(b=>b.id===bid);
  const e=getAllEmps().find(x=>x.id===eid);
  if(b&&e&&!b.emps.find(x=>x.id===eid)) b.emps.push(e);
  const i=document.getElementById('asi-'+bid);if(i)i.value='';
  saveAtvBlocos();
  renderAtv();
};
function updateAtvPv(){const p=document.getElementById('atv-preview');if(p)p.textContent=buildAtvMsg()}

// ── COPY ────────────────────────────────────────────────────────
window.copyText = function(elId){
  const el=document.getElementById(elId);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>{
    const btns = el.nextElementSibling;
    if(btns){const t=btns.textContent;btns.textContent='✓ copiado!';setTimeout(()=>btns.textContent=t,2000)}
  });
};

// ── RENDER ALL ───────────────────────────────────────────────────
function renderAll(){
  if(document.getElementById('page-controle').classList.contains('active')) renderControle();
  if(document.getElementById('page-stats').classList.contains('active')) renderStats();
  if(document.getElementById('page-atv').classList.contains('active')) renderAtv();
}

renderAll();
</script>
